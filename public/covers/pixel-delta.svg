<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="muzzle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffa500"/>
      <stop offset="50%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ffa500;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="flash1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#ffa500;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e63946;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="flash2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#ffa500;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#e63946;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>

  <!-- Tactical grid -->
  <g opacity="0.04" stroke="#e63946" stroke-width="0.5">
    <line x1="0" y1="45" x2="400" y2="45"/><line x1="0" y1="90" x2="400" y2="90"/>
    <line x1="0" y1="135" x2="400" y2="135"/><line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="80" y1="0" x2="80" y2="225"/><line x1="160" y1="0" x2="160" y2="225"/>
    <line x1="240" y1="0" x2="240" y2="225"/><line x1="320" y1="0" x2="320" y2="225"/>
  </g>

  <!-- Background buildings silhouette -->
  <g fill="#111122" opacity="0.6">
    <rect x="20" y="60" width="50" height="100"/><rect x="25" y="55" width="15" height="5"/>
    <rect x="80" y="80" width="35" height="80"/>
    <rect x="290" y="50" width="45" height="110"/><rect x="300" y="42" width="10" height="8"/>
    <rect x="345" y="70" width="40" height="90"/>
    <rect x="130" y="90" width="25" height="70"/>
    <rect x="240" y="85" width="30" height="75"/>
  </g>
  <!-- Building windows -->
  <g fill="#e63946" opacity="0.08">
    <rect x="30" y="70" width="6" height="6"/><rect x="42" y="70" width="6" height="6"/><rect x="54" y="70" width="6" height="6"/>
    <rect x="30" y="85" width="6" height="6"/><rect x="42" y="85" width="6" height="6"/><rect x="54" y="85" width="6" height="6"/>
    <rect x="30" y="100" width="6" height="6"/><rect x="42" y="100" width="6" height="6"/>
    <rect x="300" y="60" width="6" height="6"/><rect x="312" y="60" width="6" height="6"/><rect x="324" y="60" width="6" height="6"/>
    <rect x="300" y="75" width="6" height="6"/><rect x="312" y="75" width="6" height="6"/>
    <rect x="300" y="90" width="6" height="6"/><rect x="312" y="90" width="6" height="6"/><rect x="324" y="90" width="6" height="6"/>
  </g>

  <!-- Soldier 1 (left, shooting right) - pixel art style -->
  <g transform="translate(105,78)">
    <!-- Helmet -->
    <rect x="2" y="0" width="16" height="4" fill="#3a5a3a"/>
    <rect x="4" y="4" width="12" height="3" fill="#3a5a3a"/>
    <!-- Head -->
    <rect x="5" y="7" width="10" height="8" fill="#d4a574"/>
    <rect x="7" y="9" width="2" height="2" fill="#222"/>
    <rect x="11" y="9" width="2" height="2" fill="#222"/>
    <!-- Body (tactical vest) -->
    <rect x="3" y="15" width="14" height="14" fill="#2d4a2d"/>
    <rect x="5" y="16" width="4" height="3" fill="#4a6a4a"/>
    <rect x="11" y="16" width="4" height="3" fill="#4a6a4a"/>
    <!-- Arms -->
    <rect x="-2" y="17" width="5" height="4" fill="#2d4a2d"/>
    <rect x="17" y="15" width="5" height="4" fill="#2d4a2d"/>
    <!-- Gun (assault rifle pointing right) -->
    <rect x="22" y="13" width="28" height="4" fill="#444"/>
    <rect x="22" y="11" width="4" height="2" fill="#555"/>
    <rect x="48" y="12" width="6" height="2" fill="#555"/>
    <rect x="18" y="17" width="8" height="3" fill="#333"/>
    <rect x="36" y="17" width="3" height="5" fill="#444"/>
    <!-- Muzzle flash -->
    <ellipse cx="60" cy="14" rx="12" ry="8" fill="url(#flash1)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="0.15s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Legs -->
    <rect x="4" y="29" width="5" height="12" fill="#2d4a2d"/>
    <rect x="11" y="29" width="5" height="12" fill="#2d4a2d"/>
    <rect x="3" y="41" width="6" height="3" fill="#333"/>
    <rect x="11" y="41" width="6" height="3" fill="#333"/>
  </g>

  <!-- Bullet trails from soldier 1 -->
  <g filter="url(#glow)">
    <line x1="165" y1="92" x2="240" y2="88" stroke="#ffa500" stroke-width="2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="0.2s" repeatCount="indefinite"/>
    </line>
    <line x1="165" y1="94" x2="235" y2="95" stroke="#ffa500" stroke-width="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="0.25s" repeatCount="indefinite"/>
    </line>
    <line x1="165" y1="91" x2="225" y2="82" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Soldier 2 (right, shooting left) - enemy -->
  <g transform="translate(260,82)">
    <!-- Helmet -->
    <rect x="2" y="0" width="16" height="4" fill="#5a3a3a"/>
    <rect x="4" y="4" width="12" height="3" fill="#5a3a3a"/>
    <!-- Head -->
    <rect x="5" y="7" width="10" height="8" fill="#d4a574"/>
    <rect x="7" y="9" width="2" height="2" fill="#222"/>
    <rect x="11" y="9" width="2" height="2" fill="#222"/>
    <!-- Body -->
    <rect x="3" y="15" width="14" height="14" fill="#4a2d2d"/>
    <rect x="5" y="16" width="4" height="3" fill="#6a4a4a"/>
    <rect x="11" y="16" width="4" height="3" fill="#6a4a4a"/>
    <!-- Arms -->
    <rect x="-2" y="15" width="5" height="4" fill="#4a2d2d"/>
    <rect x="17" y="17" width="5" height="4" fill="#4a2d2d"/>
    <!-- Gun (pointing left) -->
    <rect x="-28" y="13" width="28" height="4" fill="#444"/>
    <rect x="-6" y="11" width="4" height="2" fill="#555"/>
    <rect x="-34" y="12" width="6" height="2" fill="#555"/>
    <rect x="-4" y="17" width="8" height="3" fill="#333"/>
    <!-- Muzzle flash -->
    <ellipse cx="-38" cy="14" rx="10" ry="7" fill="url(#flash2)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="0.18s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Legs -->
    <rect x="4" y="29" width="5" height="12" fill="#4a2d2d"/>
    <rect x="11" y="29" width="5" height="12" fill="#4a2d2d"/>
    <rect x="3" y="41" width="6" height="3" fill="#333"/>
    <rect x="11" y="41" width="6" height="3" fill="#333"/>
  </g>

  <!-- Bullet trails from soldier 2 -->
  <g filter="url(#glow)">
    <line x1="225" y1="96" x2="170" y2="100" stroke="#ffa500" stroke-width="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="0.22s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Bullet impact sparks (center) -->
  <g transform="translate(200,90)" filter="url(#glow)">
    <circle cx="0" cy="0" r="2" fill="#ffa500" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="0.3s" repeatCount="indefinite"/>
    </circle>
    <line x1="0" y1="0" x2="5" y2="-8" stroke="#ffa500" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="-4" y2="-6" stroke="#ff6b6b" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="7" y2="3" stroke="#ffa500" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-3" y2="5" stroke="#ff6b6b" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Shell casings flying -->
  <g fill="#ffd700" opacity="0.4">
    <rect x="155" y="85" width="3" height="1.5" rx="0.5" transform="rotate(-30 155 85)"/>
    <rect x="160" y="78" width="3" height="1.5" rx="0.5" transform="rotate(-60 160 78)"/>
    <rect x="252" y="88" width="3" height="1.5" rx="0.5" transform="rotate(25 252 88)"/>
  </g>

  <!-- Grenade on ground -->
  <g transform="translate(185,145)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="5" ry="4" fill="#3a5a3a"/>
    <rect x="-1" y="-7" width="2" height="4" fill="#555"/>
    <rect x="-3" y="-8" width="6" height="2" rx="1" fill="#666"/>
  </g>

  <!-- Loot crate -->
  <g transform="translate(55,148)" opacity="0.45">
    <rect x="0" y="0" width="20" height="14" rx="1" fill="#2a4a2a" stroke="#4ade80" stroke-width="0.5"/>
    <line x1="10" y1="0" x2="10" y2="14" stroke="#4ade80" stroke-width="0.3" opacity="0.5"/>
    <line x1="0" y1="7" x2="20" y2="7" stroke="#4ade80" stroke-width="0.3" opacity="0.5"/>
    <text x="10" y="10" text-anchor="middle" fill="#4ade80" font-size="6" font-family="sans-serif">LOOT</text>
  </g>

  <!-- Ammo box -->
  <g transform="translate(320,150)" opacity="0.4">
    <rect x="0" y="0" width="16" height="10" rx="1" fill="#4a3a2a" stroke="#ffd700" stroke-width="0.5"/>
    <text x="8" y="7" text-anchor="middle" fill="#ffd700" font-size="5" font-family="sans-serif">AMMO</text>
  </g>

  <!-- Crosshair overlay (center, subtle) -->
  <g opacity="0.1" stroke="#e63946" stroke-width="0.8">
    <circle cx="200" cy="112" r="35" fill="none"/>
    <circle cx="200" cy="112" r="18" fill="none"/>
    <line x1="200" y1="70" x2="200" y2="87"/><line x1="200" y1="137" x2="200" y2="154"/>
    <line x1="158" y1="112" x2="175" y2="112"/><line x1="225" y1="112" x2="242" y2="112"/>
    <circle cx="200" cy="112" r="2" fill="#e63946" opacity="0.3"/>
  </g>

  <!-- HP bar (top-left HUD element) -->
  <g transform="translate(15,12)" opacity="0.35">
    <rect x="0" y="0" width="60" height="8" rx="2" fill="#222" stroke="#444" stroke-width="0.5"/>
    <rect x="1" y="1" width="42" height="6" rx="1.5" fill="#e63946"/>
    <text x="30" y="7" text-anchor="middle" fill="#fff" font-size="5" font-family="sans-serif">HP 70</text>
  </g>

  <!-- Ammo counter (top-left HUD) -->
  <g transform="translate(15,24)" opacity="0.3">
    <text x="0" y="8" fill="#aaa" font-size="7" font-family="monospace">AK-47 | 24/90</text>
  </g>

  <!-- Timer (top-right HUD) -->
  <g transform="translate(345,12)" opacity="0.3">
    <text x="0" y="8" fill="#ffd700" font-size="8" font-family="monospace" font-weight="bold">2:47</text>
  </g>

  <!-- Kill feed (top-right) -->
  <g transform="translate(290,25)" opacity="0.2">
    <text x="0" y="0" fill="#e63946" font-size="6" font-family="sans-serif">Player ✕ Guard</text>
    <text x="0" y="10" fill="#ffa500" font-size="6" font-family="sans-serif">Player ✕ Patrol</text>
  </g>

  <!-- Extract zone marker -->
  <g transform="translate(340,180)" opacity="0.3">
    <polygon points="12,0 24,20 0,20" fill="none" stroke="#4ade80" stroke-width="1.5"/>
    <text x="12" y="16" text-anchor="middle" fill="#4ade80" font-size="7" font-family="sans-serif">EXIT</text>
    <circle cx="12" cy="10" r="16" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 12 10" to="360 12 10" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Smoke/dust particles -->
  <g opacity="0.08">
    <circle cx="190" cy="130" r="15" fill="#888"/>
    <circle cx="210" cy="125" r="12" fill="#777"/>
    <circle cx="195" cy="140" r="10" fill="#666"/>
  </g>

  <!-- Ground texture hints -->
  <g opacity="0.03" fill="#e63946">
    <rect x="0" y="160" width="400" height="65"/>
  </g>
  <g opacity="0.05" stroke="#555" stroke-width="0.3">
    <line x1="0" y1="160" x2="400" y2="160"/>
  </g>
</svg>
