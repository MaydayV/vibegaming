<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <radialGradient id="g1" cx="30%" cy="40%"><stop offset="0%" style="stop-color:#e94560;stop-opacity:0.25"/><stop offset="100%" style="stop-color:transparent"/></radialGradient>
    <radialGradient id="g2" cx="70%" cy="60%"><stop offset="0%" style="stop-color:#f5a623;stop-opacity:0.2"/><stop offset="100%" style="stop-color:transparent"/></radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#g1)"/>
  <rect width="800" height="500" fill="url(#g2)"/>
  <!-- 星星 -->
  <circle cx="80" cy="60" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="200" cy="90" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="450" cy="40" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="650" cy="80" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="720" cy="120" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="350" cy="70" r="1" fill="#fff" opacity="0.5"/>
  <!-- 地面 -->
  <rect x="0" y="400" width="800" height="100" fill="#12122a" opacity="0.8"/>
  <rect x="0" y="398" width="800" height="4" fill="#e94560" opacity="0.3"/>
  <!-- 像素猫1 - 橘猫(左) -->
  <g transform="translate(140,200)">
    <!-- 身体 -->
    <rect x="20" y="60" width="80" height="60" rx="8" fill="#f5a623"/>
    <rect x="25" y="65" width="70" height="50" rx="6" fill="#f7b84e"/>
    <!-- 头 -->
    <rect x="15" y="10" width="90" height="70" rx="12" fill="#f5a623"/>
    <rect x="20" y="15" width="80" height="60" rx="10" fill="#f7b84e"/>
    <!-- 耳朵 -->
    <polygon points="20,20 10,0 35,15" fill="#f5a623"/>
    <polygon points="100,20 110,0 85,15" fill="#f5a623"/>
    <polygon points="23,18 15,4 33,16" fill="#ffcb7c"/>
    <polygon points="97,18 105,4 87,16" fill="#ffcb7c"/>
    <!-- 眼睛 -->
    <circle cx="42" cy="42" r="10" fill="#fff"/>
    <circle cx="78" cy="42" r="10" fill="#fff"/>
    <circle cx="44" cy="43" r="6" fill="#333"/>
    <circle cx="80" cy="43" r="6" fill="#333"/>
    <circle cx="46" cy="41" r="2" fill="#fff"/>
    <circle cx="82" cy="41" r="2" fill="#fff"/>
    <!-- 鼻子嘴 -->
    <ellipse cx="60" cy="56" rx="4" ry="3" fill="#e94560"/>
    <path d="M52,62 Q60,70 68,62" stroke="#d4a574" stroke-width="2" fill="none"/>
    <!-- 条纹 -->
    <rect x="35" y="70" width="8" height="20" rx="2" fill="#e8941a" opacity="0.5"/>
    <rect x="55" y="68" width="8" height="22" rx="2" fill="#e8941a" opacity="0.5"/>
    <rect x="75" y="70" width="8" height="20" rx="2" fill="#e8941a" opacity="0.5"/>
    <!-- 尾巴 -->
    <path d="M100,90 Q130,70 125,50 Q122,40 115,45" stroke="#f5a623" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- 爪子 -->
    <rect x="25" y="115" width="20" height="12" rx="6" fill="#f5a623"/>
    <rect x="75" y="115" width="20" height="12" rx="6" fill="#f5a623"/>
    <!-- 爱心 -->
    <text x="50" y="-5" font-size="20" text-anchor="middle" opacity="0.8">❤️</text>
  </g>
  <!-- 像素猫2 - 灰猫(中) -->
  <g transform="translate(340,220)">
    <rect x="20" y="50" width="70" height="50" rx="8" fill="#8e99a4"/>
    <rect x="25" y="55" width="60" height="40" rx="6" fill="#a0aab4"/>
    <rect x="15" y="5" width="80" height="60" rx="12" fill="#8e99a4"/>
    <rect x="20" y="10" width="70" height="50" rx="10" fill="#a0aab4"/>
    <polygon points="20,15 12,0 33,12" fill="#8e99a4"/>
    <polygon points="90,15 98,0 77,12" fill="#8e99a4"/>
    <polygon points="23,14 16,3 31,12" fill="#b8c2cc"/>
    <polygon points="87,14 94,3 79,12" fill="#b8c2cc"/>
    <circle cx="38" cy="35" r="9" fill="#fff"/>
    <circle cx="72" cy="35" r="9" fill="#fff"/>
    <circle cx="39" cy="36" r="5.5" fill="#4a7c59"/>
    <circle cx="73" cy="36" r="5.5" fill="#4a7c59"/>
    <circle cx="41" cy="34" r="2" fill="#fff"/>
    <circle cx="75" cy="34" r="2" fill="#fff"/>
    <ellipse cx="55" cy="48" rx="3.5" ry="2.5" fill="#e94560"/>
    <path d="M48,53 Q55,60 62,53" stroke="#888" stroke-width="2" fill="none"/>
    <path d="M90,75 Q115,55 110,38" stroke="#8e99a4" stroke-width="9" fill="none" stroke-linecap="round"/>
    <rect x="22" y="96" width="18" height="10" rx="5" fill="#8e99a4"/>
    <rect x="68" y="96" width="18" height="10" rx="5" fill="#8e99a4"/>
    <!-- 毛线球 -->
    <circle cx="0" cy="110" r="14" fill="#e94560" opacity="0.7"/>
    <path d="M-8,105 Q0,95 8,105 Q12,112 0,115 Q-10,112 -8,105" stroke="#c0392b" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- zzz -->
    <text x="85" y="0" font-size="16" fill="#fff" opacity="0.4" font-weight="bold">z</text>
    <text x="95" y="-12" font-size="12" fill="#fff" opacity="0.3" font-weight="bold">z</text>
  </g>
  <!-- 像素猫3 - 黑猫(右) -->
  <g transform="translate(540,190)">
    <rect x="20" y="60" width="80" height="60" rx="8" fill="#2c2c3e"/>
    <rect x="25" y="65" width="70" height="50" rx="6" fill="#3a3a50"/>
    <rect x="15" y="10" width="90" height="70" rx="12" fill="#2c2c3e"/>
    <rect x="20" y="15" width="80" height="60" rx="10" fill="#3a3a50"/>
    <polygon points="20,20 10,0 35,15" fill="#2c2c3e"/>
    <polygon points="100,20 110,0 85,15" fill="#2c2c3e"/>
    <polygon points="23,18 15,4 33,16" fill="#3a3a50"/>
    <polygon points="97,18 105,4 87,16" fill="#3a3a50"/>
    <circle cx="42" cy="42" r="10" fill="#ffe066"/>
    <circle cx="78" cy="42" r="10" fill="#ffe066"/>
    <ellipse cx="42" cy="42" rx="3" ry="8" fill="#333"/>
    <ellipse cx="78" cy="42" rx="3" ry="8" fill="#333"/>
    <ellipse cx="60" cy="56" rx="4" ry="3" fill="#e94560"/>
    <path d="M52,62 Q60,70 68,62" stroke="#555" stroke-width="2" fill="none"/>
    <path d="M100,90 Q135,80 130,55 Q128,45 120,50" stroke="#2c2c3e" stroke-width="10" fill="none" stroke-linecap="round"/>
    <rect x="25" y="115" width="20" height="12" rx="6" fill="#2c2c3e"/>
    <rect x="75" y="115" width="20" height="12" rx="6" fill="#2c2c3e"/>
    <!-- 鱼 -->
    <text x="115" y="50" font-size="22" opacity="0.7">🐟</text>
  </g>
  <!-- 猫粮碗 -->
  <g transform="translate(350,390)">
    <ellipse cx="50" cy="15" rx="35" ry="10" fill="#555"/>
    <rect x="15" y="5" width="70" height="12" rx="4" fill="#666"/>
    <ellipse cx="50" cy="5" rx="35" ry="10" fill="#777"/>
    <circle cx="35" cy="4" r="4" fill="#c0825a"/>
    <circle cx="50" cy="2" r="4" fill="#c0825a"/>
    <circle cx="65" cy="4" r="4" fill="#c0825a"/>
    <circle cx="42" cy="7" r="3" fill="#b07548"/>
    <circle cx="58" cy="6" r="3" fill="#b07548"/>
  </g>
  <!-- 底部文字 -->
  <text x="400" y="475" text-anchor="middle" font-size="20" font-weight="bold" fill="rgba(255,255,255,0.12)" font-family="sans-serif">PIXEL CATS</text>
</svg>