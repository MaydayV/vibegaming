<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Grid lines (dev feel) -->
  <g stroke="#2a2a4e" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>
  <!-- Pixel monitor -->
  <g transform="translate(130,40)">
    <rect x="0" y="0" width="140" height="100" rx="4" fill="#2a2a4e" stroke="#4a4a6e" stroke-width="2"/>
    <rect x="6" y="6" width="128" height="80" fill="#0a0a1e"/>
    <!-- Code lines on screen -->
    <rect x="12" y="14" width="40" height="4" fill="#e94560" opacity="0.8"/>
    <rect x="56" y="14" width="20" height="4" fill="#f5c842" opacity="0.6"/>
    <rect x="12" y="24" width="24" height="4" fill="#4fc3f7" opacity="0.7"/>
    <rect x="40" y="24" width="50" height="4" fill="#66BB6A" opacity="0.6"/>
    <rect x="20" y="34" width="36" height="4" fill="#ba68c8" opacity="0.7"/>
    <rect x="60" y="34" width="28" height="4" fill="#f5c842" opacity="0.5"/>
    <rect x="20" y="44" width="44" height="4" fill="#4fc3f7" opacity="0.6"/>
    <rect x="12" y="54" width="30" height="4" fill="#e94560" opacity="0.7"/>
    <rect x="46" y="54" width="40" height="4" fill="#66BB6A" opacity="0.5"/>
    <rect x="12" y="64" width="50" height="4" fill="#f5c842" opacity="0.6"/>
    <rect x="66" y="64" width="20" height="4" fill="#ba68c8" opacity="0.5"/>
    <!-- Cursor blink -->
    <rect x="90" y="64" width="3" height="6" fill="#fff" opacity="0.8"/>
    <!-- Monitor stand -->
    <rect x="55" y="100" width="30" height="8" fill="#3a3a5e"/>
    <rect x="45" y="106" width="50" height="4" rx="2" fill="#4a4a6e"/>
  </g>
  <!-- Game controller (pixel) -->
  <g transform="translate(50,160)">
    <rect x="0" y="8" width="40" height="24" rx="6" fill="#3a3a5e"/>
    <rect x="-4" y="12" width="12" height="16" rx="4" fill="#4a4a6e"/>
    <rect x="32" y="12" width="12" height="16" rx="4" fill="#4a4a6e"/>
    <!-- D-pad -->
    <rect x="6" y="16" width="3" height="9" fill="#6a6a8e"/>
    <rect x="3" y="19" width="9" height="3" fill="#6a6a8e"/>
    <!-- Buttons -->
    <circle cx="31" cy="17" r="2" fill="#e94560"/>
    <circle cx="36" cy="22" r="2" fill="#4fc3f7"/>
  </g>
  <!-- Progress bars (dev progress) -->
  <g transform="translate(280,170)">
    <text x="0" y="0" font-size="8" fill="#8a8aae" font-family="monospace">DEV</text>
    <rect x="0" y="6" width="80" height="6" rx="3" fill="#2a2a4e"/>
    <rect x="0" y="6" width="60" height="6" rx="3" fill="#e94560"/>
    <text x="0" y="24" font-size="8" fill="#8a8aae" font-family="monospace">ART</text>
    <rect x="0" y="30" width="80" height="6" rx="3" fill="#2a2a4e"/>
    <rect x="0" y="30" width="45" height="6" rx="3" fill="#f5c842"/>
    <text x="0" y="48" font-size="8" fill="#8a8aae" font-family="monospace">SFX</text>
    <rect x="0" y="54" width="80" height="6" rx="3" fill="#2a2a4e"/>
    <rect x="0" y="54" width="30" height="6" rx="3" fill="#4fc3f7"/>
  </g>
  <!-- Coins (revenue) -->
  <g fill="#f5c842">
    <circle cx="80" cy="240" r="8" opacity="0.8"/>
    <circle cx="80" cy="240" r="5" fill="#ffd54f"/>
    <text x="77" y="243" font-size="8" fill="#b8860b" font-family="monospace">$</text>
    <circle cx="100" cy="248" r="6" opacity="0.6"/>
    <circle cx="100" cy="248" r="4" fill="#ffd54f"/>
    <circle cx="64" cy="250" r="5" opacity="0.5"/>
    <circle cx="64" cy="250" r="3" fill="#ffd54f"/>
  </g>
  <!-- Star rating -->
  <g transform="translate(140,250)" fill="#f5c842" opacity="0.8">
    <polygon points="10,0 12,7 20,7 14,11 16,18 10,14 4,18 6,11 0,7 8,7"/>
    <polygon points="30,0 32,7 40,7 34,11 36,18 30,14 24,18 26,11 20,7 28,7"/>
    <polygon points="50,0 52,7 60,7 54,11 56,18 50,14 44,18 46,11 40,7 48,7"/>
    <polygon points="70,0 72,7 80,7 74,11 76,18 70,14 64,18 66,11 60,7 68,7"/>
    <polygon points="90,2 91,6 96,6 92,9 93,14 90,11 87,14 88,9 84,6 89,6" fill="#4a4a6e"/>
  </g>
  <!-- Pixel team members -->
  <g transform="translate(300,240)">
    <rect x="0" y="0" width="6" height="6" fill="#e8c8a0"/>
    <rect x="-1" y="6" width="8" height="8" fill="#e94560"/>
    <rect x="14" y="0" width="6" height="6" fill="#e8c8a0"/>
    <rect x="13" y="6" width="8" height="8" fill="#4fc3f7"/>
    <rect x="28" y="0" width="6" height="6" fill="#e8c8a0"/>
    <rect x="27" y="6" width="8" height="8" fill="#66BB6A"/>
  </g>
</svg>