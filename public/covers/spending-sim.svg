<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="50%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="20"/>
  
  <!-- 金币散落效果 -->
  <circle cx="60" cy="50" r="20" fill="url(#gold)" opacity="0.8"/>
  <text x="60" y="56" text-anchor="middle" font-size="16" fill="#b8860b" font-weight="bold">¥</text>
  
  <circle cx="340" cy="80" r="15" fill="url(#gold)" opacity="0.6"/>
  <text x="340" y="85" text-anchor="middle" font-size="12" fill="#b8860b" font-weight="bold">¥</text>
  
  <circle cx="320" cy="240" r="18" fill="url(#gold)" opacity="0.7"/>
  <text x="320" y="246" text-anchor="middle" font-size="14" fill="#b8860b" font-weight="bold">¥</text>
  
  <circle cx="80" cy="230" r="12" fill="url(#gold)" opacity="0.5"/>
  <text x="80" y="235" text-anchor="middle" font-size="10" fill="#b8860b" font-weight="bold">¥</text>
  
  <circle cx="350" cy="160" r="10" fill="url(#gold)" opacity="0.4"/>
  <circle cx="50" cy="140" r="14" fill="url(#gold)" opacity="0.5"/>
  
  <!-- 中心大金币 -->
  <circle cx="200" cy="120" r="55" fill="url(#gold)" stroke="#b8860b" stroke-width="3"/>
  <circle cx="200" cy="120" r="45" fill="none" stroke="#b8860b" stroke-width="2" opacity="0.5"/>
  <text x="200" y="135" text-anchor="middle" font-size="40" fill="#b8860b" font-weight="bold">¥</text>
  
  <!-- 标题 -->
  <text x="200" y="210" text-anchor="middle" font-size="32" fill="white" font-weight="bold" font-family="sans-serif">花钱模拟器</text>
  <text x="200" y="245" text-anchor="middle" font-size="16" fill="rgba(255,255,255,0.8)" font-family="sans-serif">100亿随便花！</text>
  
  <!-- 小图标装饰 -->
  <text x="120" y="270" font-size="20">🏠</text>
  <text x="160" y="275" font-size="18">✈️</text>
  <text x="220" y="275" font-size="18">🚗</text>
  <text x="260" y="270" font-size="20">💎</text>
</svg>
