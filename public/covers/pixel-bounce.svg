<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0a0a2e"/>
  <g fill="none" stroke="#111" stroke-width="0.5">
    <line x1="0" y1="0" x2="400" y2="0"/><line x1="0" y1="20" x2="400" y2="20"/><line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="80" x2="400" y2="80"/><line x1="0" y1="100" x2="400" y2="100"/><line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="140" x2="400" y2="140"/><line x1="0" y1="160" x2="400" y2="160"/><line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="200" x2="400" y2="200"/><line x1="0" y1="220" x2="400" y2="220"/><line x1="0" y1="240" x2="400" y2="240"/><line x1="0" y1="260" x2="400" y2="260"/><line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="0" x2="0" y2="300"/><line x1="20" y1="0" x2="20" y2="300"/><line x1="40" y1="0" x2="40" y2="300"/><line x1="60" y1="0" x2="60" y2="300"/><line x1="80" y1="0" x2="80" y2="300"/><line x1="100" y1="0" x2="100" y2="300"/><line x1="120" y1="0" x2="120" y2="300"/><line x1="140" y1="0" x2="140" y2="300"/><line x1="160" y1="0" x2="160" y2="300"/><line x1="180" y1="0" x2="180" y2="300"/><line x1="200" y1="0" x2="200" y2="300"/><line x1="220" y1="0" x2="220" y2="300"/><line x1="240" y1="0" x2="240" y2="300"/><line x1="260" y1="0" x2="260" y2="300"/><line x1="280" y1="0" x2="280" y2="300"/><line x1="300" y1="0" x2="300" y2="300"/><line x1="320" y1="0" x2="320" y2="300"/><line x1="340" y1="0" x2="340" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/><line x1="380" y1="0" x2="380" y2="300"/>
  </g>
  <!-- Bricks row 1 -->
  <rect x="40" y="40" width="56" height="20" rx="2" fill="#ff0000"/><rect x="108" y="40" width="56" height="20" rx="2" fill="#ff0000"/><rect x="176" y="40" width="56" height="20" rx="2" fill="#ff0000"/><rect x="244" y="40" width="56" height="20" rx="2" fill="#ff0000"/><rect x="312" y="40" width="56" height="20" rx="2" fill="#ff0000"/>
  <!-- Bricks row 2 -->
  <rect x="40" y="68" width="56" height="20" rx="2" fill="#ff7700"/><rect x="108" y="68" width="56" height="20" rx="2" fill="#ff7700"/><rect x="176" y="68" width="56" height="20" rx="2" fill="#ff7700"/><rect x="244" y="68" width="56" height="20" rx="2" fill="#ff7700"/><rect x="312" y="68" width="56" height="20" rx="2" fill="#ff7700"/>
  <!-- Bricks row 3 -->
  <rect x="40" y="96" width="56" height="20" rx="2" fill="#ffff00"/><rect x="176" y="96" width="56" height="20" rx="2" fill="#ffff00"/><rect x="312" y="96" width="56" height="20" rx="2" fill="#ffff00"/>
  <!-- Bricks row 4 -->
  <rect x="108" y="124" width="56" height="20" rx="2" fill="#00ff00"/><rect x="244" y="124" width="56" height="20" rx="2" fill="#00ff00"/>
  <!-- Ball -->
  <circle cx="220" cy="200" r="8" fill="#fff">
    <animate attributeName="cy" values="200;180;200" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Ball trail -->
  <circle cx="220" cy="210" r="5" fill="#fff" opacity="0.3"/>
  <circle cx="220" cy="218" r="3" fill="#fff" opacity="0.15"/>
  <!-- Paddle -->
  <rect x="150" y="250" width="100" height="14" rx="3" fill="#00ff00">
    <animate attributeName="x" values="150;160;140;150" dur="2s" repeatCount="indefinite"/>
  </rect>
  <!-- Glow -->
  <circle cx="220" cy="200" r="12" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="12;18;12" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Powerup falling -->
  <rect x="88" y="170" width="24" height="24" rx="4" fill="#ff00ff" opacity="0.8">
    <animate attributeName="y" values="150;220" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="100" y="188" font-size="12" fill="#fff" text-anchor="middle" font-family="monospace">
    <animate attributeName="y" values="168;238" dur="2s" repeatCount="indefinite"/>多
  </text>
</svg>
