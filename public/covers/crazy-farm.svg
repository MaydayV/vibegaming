<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="340" cy="50" r="30" fill="#ffd700" opacity="0.9"/>
  <circle cx="340" cy="50" r="36" fill="#ffd700" opacity="0.15"/>
  <!-- Clouds -->
  <g fill="#fff" opacity="0.7">
    <rect x="60" y="30" width="20" height="8" rx="4"/>
    <rect x="50" y="34" width="40" height="10" rx="5"/>
    <rect x="180" y="50" width="16" height="6" rx="3"/>
    <rect x="172" y="52" width="32" height="8" rx="4"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="160" width="400" height="140" fill="#8B6914"/>
  <rect x="0" y="155" width="400" height="12" fill="#4CAF50"/>
  <!-- Tilled soil rows -->
  <g fill="#6B4914" opacity="0.6">
    <rect x="30" y="175" width="340" height="4" rx="2"/>
    <rect x="30" y="200" width="340" height="4" rx="2"/>
    <rect x="30" y="225" width="340" height="4" rx="2"/>
    <rect x="30" y="250" width="340" height="4" rx="2"/>
  </g>
  <!-- Pixel crops row 1 (carrots) -->
  <g>
    <rect x="60" y="165" width="4" height="10" fill="#4CAF50"/>
    <rect x="62" y="160" width="3" height="5" fill="#66BB6A"/>
    <rect x="58" y="162" width="3" height="5" fill="#66BB6A"/>
    <rect x="100" y="165" width="4" height="10" fill="#4CAF50"/>
    <rect x="102" y="160" width="3" height="5" fill="#66BB6A"/>
    <rect x="140" y="165" width="4" height="10" fill="#4CAF50"/>
    <rect x="138" y="162" width="3" height="5" fill="#66BB6A"/>
    <rect x="142" y="160" width="3" height="5" fill="#66BB6A"/>
  </g>
  <!-- Pixel crops row 2 (tomatoes) -->
  <g>
    <rect x="200" y="188" width="4" height="12" fill="#4CAF50"/>
    <circle cx="202" cy="186" r="5" fill="#e53935"/>
    <circle cx="202" cy="186" r="3" fill="#ef5350"/>
    <rect x="240" y="188" width="4" height="12" fill="#4CAF50"/>
    <circle cx="242" cy="186" r="5" fill="#e53935"/>
    <circle cx="242" cy="186" r="3" fill="#ef5350"/>
    <rect x="280" y="188" width="4" height="12" fill="#4CAF50"/>
    <circle cx="282" cy="186" r="5" fill="#e53935"/>
  </g>
  <!-- Pixel crops row 3 (wheat) -->
  <g fill="#ffd54f">
    <rect x="60" y="212" width="3" height="13" fill="#8BC34A"/>
    <rect x="58" y="208" width="7" height="6" rx="1"/>
    <rect x="90" y="212" width="3" height="13" fill="#8BC34A"/>
    <rect x="88" y="208" width="7" height="6" rx="1"/>
    <rect x="120" y="212" width="3" height="13" fill="#8BC34A"/>
    <rect x="118" y="208" width="7" height="6" rx="1"/>
    <rect x="150" y="212" width="3" height="13" fill="#8BC34A"/>
    <rect x="148" y="208" width="7" height="6" rx="1"/>
  </g>
  <!-- Fence -->
  <g fill="#8D6E63">
    <rect x="20" y="145" width="4" height="20"/>
    <rect x="80" y="145" width="4" height="20"/>
    <rect x="140" y="145" width="4" height="20"/>
    <rect x="200" y="145" width="4" height="20"/>
    <rect x="260" y="145" width="4" height="20"/>
    <rect x="320" y="145" width="4" height="20"/>
    <rect x="380" y="145" width="4" height="20"/>
    <rect x="20" y="148" width="364" height="3"/>
    <rect x="20" y="156" width="364" height="3"/>
  </g>
  <!-- Pixel farmer -->
  <g transform="translate(300,120)">
    <rect x="0" y="0" width="8" height="8" fill="#e8c8a0"/>
    <rect x="-1" y="-4" width="10" height="5" fill="#8D6E63"/>
    <rect x="-2" y="8" width="12" height="12" fill="#2196F3"/>
    <rect x="0" y="20" width="4" height="8" fill="#5D4037"/>
    <rect x="5" y="20" width="4" height="8" fill="#5D4037"/>
    <!-- Hoe -->
    <rect x="10" y="2" width="2" height="22" fill="#795548"/>
    <rect x="10" y="0" width="8" height="3" fill="#9E9E9E"/>
  </g>
  <!-- Watering can -->
  <g transform="translate(170,230)">
    <rect x="0" y="0" width="14" height="10" rx="2" fill="#42A5F5"/>
    <rect x="12" y="-4" width="8" height="4" fill="#42A5F5"/>
    <rect x="18" y="-6" width="3" height="3" fill="#42A5F5"/>
    <!-- Water drops -->
    <rect x="20" y="0" width="2" height="3" fill="#90CAF9" opacity="0.7"/>
    <rect x="24" y="2" width="2" height="3" fill="#90CAF9" opacity="0.5"/>
  </g>
</svg>