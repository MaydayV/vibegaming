<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tech-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#tech-bg)"/>
  
  <!-- Code lines background -->
  <g opacity="0.1" fill="#64b5f6" font-family="monospace" font-size="10">
    <text x="10" y="30">const deploy = () => {</text>
    <text x="20" y="50">  git pull origin main</text>
    <text x="20" y="70">  npm install</text>
    <text x="20" y="90">  pm2 restart app</text>
    <text x="10" y="110">}</text>
    <text x="250" y="200">ssh root@server</text>
    <text x="250" y="220">rsync -avz ./</text>
  </g>
  
  <!-- Terminal window -->
  <g transform="translate(50,40)">
    <rect width="140" height="90" rx="4" fill="#263238" opacity="0.8"/>
    <rect width="140" height="16" rx="4" fill="#37474f"/>
    <circle cx="8" cy="8" r="3" fill="#ef5350"/>
    <circle cx="18" cy="8" r="3" fill="#ffa726"/>
    <circle cx="28" cy="8" r="3" fill="#66bb6a"/>
    <text x="8" y="35" font-size="8" fill="#4caf50" font-family="monospace">$ npm run deploy</text>
    <text x="8" y="50" font-size="8" fill="#90caf9" font-family="monospace">✓ Build success</text>
    <text x="8" y="65" font-size="8" fill="#90caf9" font-family="monospace">✓ Upload done</text>
    <text x="8" y="80" font-size="8" fill="#4caf50" font-family="monospace">✓ Deployed!</text>
  </g>
  
  <!-- Pixel lobster (DevOps engineer) -->
  <g transform="translate(220,100)">
    <!-- Body -->
    <rect x="20" y="20" width="50" height="24" rx="4" fill="#e53935"/>
    <rect x="22" y="22" width="46" height="20" rx="3" fill="#ef5350"/>
    <!-- Head -->
    <rect x="60" y="16" width="20" height="18" rx="3" fill="#e53935"/>
    <rect x="62" y="18" width="16" height="14" rx="2" fill="#ef5350"/>
    <!-- Eyes (focused) -->
    <circle cx="72" cy="22" r="3" fill="#fff"/>
    <circle cx="72" cy="22" r="1.5" fill="#111"/>
    <circle cx="78" cy="20" r="2.5" fill="#fff"/>
    <circle cx="78" cy="20" r="1.2" fill="#111"/>
    <!-- Antennae -->
    <rect x="72" y="10" width="2" height="8" fill="#d32f2f" transform="rotate(-15,73,14)"/>
    <rect x="78" y="8" width="2" height="8" fill="#d32f2f" transform="rotate(15,79,12)"/>
    <circle cx="71" cy="8" r="2" fill="#ff8a80"/>
    <circle cx="80" cy="6" r="2" fill="#ff8a80"/>
    <!-- Claws (typing) -->
    <g fill="#e53935">
      <rect x="80" y="26" width="16" height="6" rx="2"/>
      <rect x="92" y="22" width="6" height="6" rx="1"/>
      <rect x="92" y="30" width="6" height="6" rx="1"/>
    </g>
    <g fill="#e53935">
      <rect x="80" y="36" width="14" height="5" rx="2"/>
      <rect x="90" y="33" width="5" height="5" rx="1"/>
      <rect x="90" y="39" width="5" height="5" rx="1"/>
    </g>
    <!-- Tail -->
    <rect x="10" y="24" width="14" height="16" rx="2" fill="#c62828"/>
    <rect x="2" y="26" width="12" height="12" rx="2" fill="#b71c1c"/>
    <polygon points="0,26 0,38 -8,32" fill="#c62828"/>
    <!-- Legs -->
    <g fill="#c62828" opacity="0.8">
      <rect x="30" y="42" width="3" height="8"/>
      <rect x="40" y="42" width="3" height="8"/>
      <rect x="50" y="42" width="3" height="8"/>
      <rect x="60" y="42" width="3" height="8"/>
    </g>
  </g>
  
  <!-- Deployment pipeline -->
  <g transform="translate(40,180)">
    <!-- Dev -->
    <rect x="0" y="0" width="50" height="30" rx="3" fill="#42a5f5" opacity="0.8"/>
    <text x="8" y="18" font-size="10" fill="#fff" font-family="monospace">DEV</text>
    <circle cx="45" cy="15" r="3" fill="#4caf50"/>
    
    <!-- Arrow -->
    <polygon points="55,15 65,10 65,20" fill="#90caf9"/>
    
    <!-- Test -->
    <rect x="70" y="0" width="50" height="30" rx="3" fill="#ffa726" opacity="0.8"/>
    <text x="76" y="18" font-size="10" fill="#fff" font-family="monospace">TEST</text>
    <circle cx="115" cy="15" r="3" fill="#4caf50"/>
    
    <!-- Arrow -->
    <polygon points="125,15 135,10 135,20" fill="#90caf9"/>
    
    <!-- Prod -->
    <rect x="140" y="0" width="50" height="30" rx="3" fill="#66bb6a" opacity="0.8"/>
    <text x="145" y="18" font-size="10" fill="#fff" font-family="monospace">PROD</text>
    <circle cx="185" cy="15" r="3" fill="#4caf50"/>
  </g>
  
  <!-- Server icons -->
  <g transform="translate(280,180)">
    <rect x="0" y="0" width="30" height="8" rx="2" fill="#546e7a" opacity="0.7"/>
    <circle cx="5" cy="4" r="1.5" fill="#4caf50"/>
    <circle cx="10" cy="4" r="1.5" fill="#4caf50"/>
    
    <rect x="0" y="12" width="30" height="8" rx="2" fill="#546e7a" opacity="0.7"/>
    <circle cx="5" cy="16" r="1.5" fill="#4caf50"/>
    <circle cx="10" cy="16" r="1.5" fill="#4caf50"/>
    
    <rect x="0" y="24" width="30" height="8" rx="2" fill="#546e7a" opacity="0.7"/>
    <circle cx="5" cy="28" r="1.5" fill="#4caf50"/>
    <circle cx="10" cy="28" r="1.5" fill="#4caf50"/>
  </g>
  
  <!-- Git branch visualization -->
  <g transform="translate(50,240)" opacity="0.3">
    <circle cx="0" cy="0" r="3" fill="#90caf9"/>
    <line x1="0" y1="0" x2="30" y2="0" stroke="#90caf9" stroke-width="2"/>
    <circle cx="30" cy="0" r="3" fill="#90caf9"/>
    <line x1="30" y1="0" x2="60" y2="0" stroke="#90caf9" stroke-width="2"/>
    <circle cx="60" cy="0" r="3" fill="#4caf50"/>
  </g>
  
  <!-- Status indicators -->
  <g transform="translate(320,40)">
    <circle cx="0" cy="0" r="4" fill="#4caf50"/>
    <text x="8" y="4" font-size="8" fill="#90caf9" font-family="monospace">Online</text>
    <circle cx="0" cy="15" r="4" fill="#4caf50"/>
    <text x="8" y="19" font-size="8" fill="#90caf9" font-family="monospace">Ready</text>
  </g>
  
  <!-- Decorative code brackets -->
  <text x="10" y="270" font-size="20" fill="#64b5f6" opacity="0.2" font-family="monospace">{</text>
  <text x="380" y="270" font-size="20" fill="#64b5f6" opacity="0.2" font-family="monospace">}</text>
</svg>
