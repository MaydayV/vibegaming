<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#0f0520"/>
    </linearGradient>
    <radialGradient id="glow"><stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.25"/><stop offset="100%" style="stop-color:transparent"/></radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <!-- 木板背景 -->
  <rect x="200" y="80" width="400" height="340" rx="20" fill="#3a2a1a" stroke="#5a4a3a" stroke-width="2"/>
  <rect x="210" y="90" width="380" height="320" rx="16" fill="#4a3828"/>
  <!-- 螺丝孔位 -->
  <g>
    <!-- 孔1 -->
    <circle cx="310" cy="180" r="28" fill="#3a2a1a" stroke="#5a4a3a" stroke-width="2"/>
    <circle cx="310" cy="180" r="18" fill="#2a1a0a"/>
    <!-- 孔2 -->
    <circle cx="410" cy="160" r="28" fill="#3a2a1a" stroke="#5a4a3a" stroke-width="2"/>
    <circle cx="410" cy="160" r="18" fill="#2a1a0a"/>
    <!-- 孔3 -->
    <circle cx="490" cy="220" r="28" fill="#3a2a1a" stroke="#5a4a3a" stroke-width="2"/>
    <circle cx="490" cy="220" r="18" fill="#2a1a0a"/>
    <!-- 孔4 -->
    <circle cx="350" cy="290" r="28" fill="#3a2a1a" stroke="#5a4a3a" stroke-width="2"/>
    <circle cx="350" cy="290" r="18" fill="#2a1a0a"/>
    <!-- 孔5 -->
    <circle cx="450" cy="320" r="28" fill="#3a2a1a" stroke="#5a4a3a" stroke-width="2"/>
    <circle cx="450" cy="320" r="18" fill="#2a1a0a"/>
  </g>
  <!-- 彩色螺丝 -->
  <g>
    <!-- 红色螺丝 -->
    <circle cx="310" cy="180" r="22" fill="#ff6b6b"/>
    <line x1="298" y1="180" x2="322" y2="180" stroke="#cc4444" stroke-width="4" stroke-linecap="round"/>
    <line x1="310" y1="168" x2="310" y2="192" stroke="#cc4444" stroke-width="4" stroke-linecap="round"/>
    <!-- 蓝色螺丝 -->
    <circle cx="410" cy="160" r="22" fill="#48dbfb"/>
    <line x1="398" y1="160" x2="422" y2="160" stroke="#2eadd3" stroke-width="4" stroke-linecap="round"/>
    <line x1="410" y1="148" x2="410" y2="172" stroke="#2eadd3" stroke-width="4" stroke-linecap="round"/>
    <!-- 绿色螺丝 -->
    <circle cx="490" cy="220" r="22" fill="#6dd400"/>
    <line x1="478" y1="220" x2="502" y2="220" stroke="#4da600" stroke-width="4" stroke-linecap="round"/>
    <line x1="490" y1="208" x2="490" y2="232" stroke="#4da600" stroke-width="4" stroke-linecap="round"/>
    <!-- 黄色螺丝 -->
    <circle cx="350" cy="290" r="22" fill="#ffd700"/>
    <line x1="338" y1="290" x2="362" y2="290" stroke="#cc9900" stroke-width="4" stroke-linecap="round"/>
    <line x1="350" y1="278" x2="350" y2="302" stroke="#cc9900" stroke-width="4" stroke-linecap="round"/>
    <!-- 紫色螺丝 -->
    <circle cx="450" cy="320" r="22" fill="#a855f7"/>
    <line x1="438" y1="320" x2="462" y2="320" stroke="#8833cc" stroke-width="4" stroke-linecap="round"/>
    <line x1="450" y1="308" x2="450" y2="332" stroke="#8833cc" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- 收集槽 -->
  <rect x="250" y="420" width="300" height="40" rx="20" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="310" cy="440" r="14" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="350" cy="440" r="14" fill="#48dbfb" opacity="0.6"/>
  <circle cx="390" cy="440" r="14" fill="#6dd400" opacity="0.6"/>
  <!-- 星星 -->
  <circle cx="120" cy="60" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="680" cy="80" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="300" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="700" cy="350" r="1.5" fill="#fff" opacity="0.5"/>
  <!-- 标题 -->
  <text x="400" y="475" text-anchor="middle" font-size="18" font-weight="bold" fill="rgba(255,255,255,0.12)" font-family="sans-serif">SCREW PUZZLE</text>
</svg>
