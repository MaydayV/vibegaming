<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#c44569"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffa07a"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- School building silhouette -->
  <rect x="50" y="140" width="300" height="160" fill="#2d1f3d" opacity="0.4" rx="4"/>
  <rect x="80" y="120" width="240" height="180" fill="#2d1f3d" opacity="0.5" rx="4"/>
  <rect x="160" y="90" width="80" height="210" fill="#2d1f3d" opacity="0.6" rx="4"/>
  <!-- Clock tower -->
  <rect x="175" y="70" width="50" height="30" fill="#2d1f3d" opacity="0.7" rx="3"/>
  <circle cx="200" cy="82" r="10" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
  <line x1="200" y1="82" x2="200" y2="76" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
  <line x1="200" y1="82" x2="205" y2="82" stroke="#ffd700" stroke-width="1.5" opacity="0.8"/>
  <!-- Windows glowing -->
  <g fill="#ffd700" opacity="0.6">
    <rect x="100" y="155" width="12" height="15" rx="1"/>
    <rect x="125" y="155" width="12" height="15" rx="1"/>
    <rect x="150" y="155" width="12" height="15" rx="1"/>
    <rect x="240" y="155" width="12" height="15" rx="1"/>
    <rect x="265" y="155" width="12" height="15" rx="1"/>
    <rect x="290" y="155" width="12" height="15" rx="1"/>
    <rect x="100" y="185" width="12" height="15" rx="1"/>
    <rect x="125" y="185" width="12" height="15" rx="1"/>
    <rect x="240" y="185" width="12" height="15" rx="1"/>
    <rect x="265" y="185" width="12" height="15" rx="1"/>
  </g>
  <!-- Cherry blossom petals -->
  <g fill="#ffb6c1" opacity="0.7">
    <circle cx="60" cy="50" r="4"/>
    <circle cx="90" cy="35" r="3"/>
    <circle cx="130" cy="55" r="5"/>
    <circle cx="280" cy="40" r="4"/>
    <circle cx="320" cy="60" r="3"/>
    <circle cx="350" cy="30" r="4"/>
    <circle cx="45" cy="80" r="3"/>
    <circle cx="340" cy="85" r="5"/>
  </g>
  <!-- Two silhouette figures -->
  <g transform="translate(140, 210)">
    <!-- Girl silhouette -->
    <circle cx="0" cy="-25" r="10" fill="#2d1f3d" opacity="0.8"/>
    <path d="M-8,-15 Q0,10 8,-15" fill="#2d1f3d" opacity="0.8"/>
    <rect x="-6" y="-10" width="12" height="30" rx="3" fill="#2d1f3d" opacity="0.8"/>
    <!-- Skirt -->
    <path d="M-6,15 L-12,35 L12,35 L6,15" fill="#2d1f3d" opacity="0.8"/>
  </g>
  <g transform="translate(170, 205)">
    <!-- Boy silhouette -->
    <circle cx="0" cy="-25" r="10" fill="#2d1f3d" opacity="0.8"/>
    <rect x="-7" y="-10" width="14" height="35" rx="3" fill="#2d1f3d" opacity="0.8"/>
    <rect x="-5" y="20" width="5" height="20" fill="#2d1f3d" opacity="0.8"/>
    <rect x="2" y="20" width="5" height="20" fill="#2d1f3d" opacity="0.8"/>
  </g>
  <!-- Hearts -->
  <g fill="#ff4757" opacity="0.8">
    <path transform="translate(155,170) scale(0.5)" d="M12,21.35l-1.45-1.32C5.4,15.36,2,12.28,2,8.5 C2,5.42,4.42,3,7.5,3c1.74,0,3.41,0.81,4.5,2.09C13.09,3.81,14.76,3,16.5,3 C19.58,3,22,5.42,22,8.5c0,3.78-3.4,6.86-8.55,11.54L12,21.35z"/>
  </g>
  <g fill="#ff6b81" opacity="0.5">
    <path transform="translate(105,125) scale(0.3)" d="M12,21.35l-1.45-1.32C5.4,15.36,2,12.28,2,8.5 C2,5.42,4.42,3,7.5,3c1.74,0,3.41,0.81,4.5,2.09C13.09,3.81,14.76,3,16.5,3 C19.58,3,22,5.42,22,8.5c0,3.78-3.4,6.86-8.55,11.54L12,21.35z"/>
    <path transform="translate(275,110) scale(0.35)" d="M12,21.35l-1.45-1.32C5.4,15.36,2,12.28,2,8.5 C2,5.42,4.42,3,7.5,3c1.74,0,3.41,0.81,4.5,2.09C13.09,3.81,14.76,3,16.5,3 C19.58,3,22,5.42,22,8.5c0,3.78-3.4,6.86-8.55,11.54L12,21.35z"/>
  </g>
  <!-- Sparkles -->
  <g fill="#fff" opacity="0.6">
    <rect x="70" y="100" width="3" height="3"/>
    <rect x="330" y="95" width="3" height="3"/>
    <rect x="50" y="140" width="2" height="2"/>
    <rect x="355" y="145" width="2" height="2"/>
  </g>
</svg>
