<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1a4a"/>
      <stop offset="100%" style="stop-color:#4a2a3a"/>
    </linearGradient>
    <linearGradient id="dragon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FF4500"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5F2D"/>
      <stop offset="100%" style="stop-color:#1a3a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="225" fill="url(#sky)"/>
  
  <!-- 像素风星星 -->
  <g fill="#FFD700" opacity="0.6">
    <rect x="30" y="20" width="3" height="3"/>
    <rect x="80" y="40" width="2" height="2"/>
    <rect x="150" y="15" width="3" height="3"/>
    <rect x="220" y="35" width="2" height="2"/>
    <rect x="300" y="25" width="3" height="3"/>
    <rect x="350" y="50" width="2" height="2"/>
    <rect x="370" y="20" width="2" height="2"/>
    <rect x="50" y="60" width="2" height="2"/>
    <rect x="180" y="55" width="2" height="2"/>
  </g>
  
  <!-- 远山（像素风） -->
  <g fill="url(#mountain)" opacity="0.5">
    <polygon points="0,180 40,120 80,160 120,100 160,150 200,90 240,140 280,110 320,160 360,130 400,170 400,225 0,225"/>
  </g>
  
  <!-- 近山（像素风） -->
  <g fill="#2D5F2D" opacity="0.8">
    <polygon points="0,200 60,150 100,180 140,130 180,170 220,140 260,180 300,150 340,190 380,160 400,190 400,225 0,225"/>
  </g>
  
  <!-- 龙的剪影（像素风） -->
  <g filter="url(#glow)">
    <!-- 龙身体 -->
    <g fill="url(#dragon)">
      <!-- 头部 -->
      <rect x="280" y="60" width="24" height="20"/>
      <rect x="276" y="64" width="8" height="12"/>
      <rect x="300" y="64" width="8" height="12"/>
      <!-- 角 -->
      <rect x="284" y="48" width="4" height="16"/>
      <rect x="296" y="48" width="4" height="16"/>
      <rect x="280" y="44" width="4" height="8"/>
      <rect x="300" y="44" width="4" height="8"/>
      <!-- 眼睛 -->
      <rect x="288" y="68" width="4" height="4" fill="#FFFFFF"/>
      <rect x="296" y="68" width="4" height="4" fill="#FFFFFF"/>
      <!-- 鬃毛 -->
      <rect x="304" y="56" width="12" height="4"/>
      <rect x="312" y="52" width="8" height="4"/>
      <rect x="316" y="48" width="8" height="4"/>
      
      <!-- 脖子 -->
      <rect x="260" y="76" width="24" height="12"/>
      <rect x="240" y="84" width="24" height="12"/>
      
      <!-- 身体 -->
      <rect x="180" y="88" width="64" height="20"/>
      <rect x="160" y="92" width="24" height="16"/>
      <rect x="140" y="96" width="24" height="12"/>
      
      <!-- 后身 -->
      <rect x="100" y="100" width="44" height="16"/>
      <rect x="80" y="104" width="24" height="12"/>
      
      <!-- 尾巴 -->
      <rect x="56" y="108" width="28" height="8"/>
      <rect x="36" y="104" width="24" height="8"/>
      <rect x="20" y="100" width="20" height="8"/>
      <rect x="8" y="96" width="16" height="8"/>
      
      <!-- 前腿 -->
      <rect x="220" y="104" width="8" height="24"/>
      <rect x="216" y="124" width="16" height="8"/>
      
      <!-- 后腿 -->
      <rect x="120" y="112" width="8" height="20"/>
      <rect x="116" y="128" width="16" height="8"/>
      
      <!-- 翅膀 -->
      <rect x="180" y="60" width="40" height="8"/>
      <rect x="172" y="52" width="32" height="8"/>
      <rect x="164" y="44" width="24" height="8"/>
      <rect x="156" y="36" width="16" height="8"/>
      
      <rect x="196" y="68" width="28" height="6"/>
      <rect x="188" y="74" width="20" height="6"/>
    </g>
    
    <!-- 龙须/火焰效果 -->
    <g fill="#FFD700" opacity="0.8">
      <rect x="304" y="72" width="8" height="4"/>
      <rect x="308" y="68" width="8" height="4"/>
      <rect x="312" y="64" width="8" height="4"/>
    </g>
  </g>
  
  <!-- 祥云（像素风） -->
  <g fill="rgba(255,255,255,0.15)">
    <rect x="40" y="140" width="20" height="8"/>
    <rect x="32" y="144" width="12" height="6"/>
    <rect x="56" y="144" width="12" height="6"/>
    
    <rect x="320" y="120" width="24" height="8"/>
    <rect x="312" y="124" width="12" height="6"/>
    <rect x="340" y="124" width="12" height="6"/>
    
    <rect x="180" y="160" width="16" height="6"/>
    <rect x="174" y="164" width="8" height="4"/>
    <rect x="192" y="164" width="8" height="4"/>
  </g>
  
  <!-- 地面（像素风草地） -->
  <rect x="0" y="200" width="400" height="25" fill="#2D5F2D"/>
  <g fill="#1a4a1a">
    <rect x="10" y="200" width="4" height="8"/>
    <rect x="30" y="200" width="4" height="10"/>
    <rect x="55" y="200" width="4" height="6"/>
    <rect x="80" y="200" width="4" height="9"/>
    <rect x="110" y="200" width="4" height="7"/>
    <rect x="140" y="200" width="4" height="10"/>
    <rect x="165" y="200" width="4" height="6"/>
    <rect x="195" y="200" width="4" height="8"/>
    <rect x="220" y="200" width="4" height="9"/>
    <rect x="250" y="200" width="4" height="7"/>
    <rect x="280" y="200" width="4" height="10"/>
    <rect x="310" y="200" width="4" height="6"/>
    <rect x="340" y="200" width="4" height="8"/>
    <rect x="370" y="200" width="4" height="9"/>
  </g>
  
  <!-- 五行符文装饰 -->
  <g fill="#FFD700" opacity="0.4">
    <!-- 木 -->
    <rect x="60" y="180" width="8" height="12"/>
    <rect x="56" y="176" width="4" height="4"/>
    <rect x="68" y="176" width="4" height="4"/>
    
    <!-- 火 -->
    <rect x="130" y="180" width="6" height="8"/>
    <rect x="127" y="184" width="4" height="8"/>
    <rect x="136" y="184" width="4" height="8"/>
    
    <!-- 土 -->
    <rect x="200" y="182" width="12" height="4"/>
    <rect x="204" y="178" width="4" height="8"/>
    
    <!-- 金 -->
    <rect x="270" y="178" width="8" height="8"/>
    <rect x="274" y="174" width="4" height="4"/>
    
    <!-- 水 -->
    <rect x="340" y="180" width="4" height="8"/>
    <rect x="336" y="184" width="4" height="6"/>
    <rect x="344" y="184" width="4" height="6"/>
  </g>
</svg>